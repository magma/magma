---

- name: Ensure dwarves/pahole is installed
  package:
    name: dwarves
    state: present

- name: Check if kernel BTF exists
  stat:
    path: /sys/kernel/btf/vmlinux
  register: btf_stat

- name: Download prebuilt BTF if missing
  when: not btf_stat.stat.exists
  get_url:
    url: "https://github.com/aquasecurity/btfhub-archive/raw/main/ubuntu/{{ ansible_kernel }}/vmlinux.btf"
    dest: "/tmp/vmlinux.btf"
    mode: '0644'

- name: Set BTF file path
  set_fact:
    btf_file: "{{ '/sys/kernel/btf/vmlinux' if btf_stat.stat.exists else '/tmp/vmlinux.btf' }}"

- name: Generate vmlinux.h from BTF
  command: "bpftool btf dump file {{ btf_file }} > {{ ebpf_source_path }}/bpf/vmlinux.h"
  args:
    creates: "{{ ebpf_source_path }}/bpf/vmlinux.h"

- name: Copy vmlinux.h to deploy path
  copy:
    src: "{{ ebpf_source_path }}/bpf/vmlinux.h"
    dest: "{{ ebpf_deploy_path }}/bpf/vmlinux.h"
    owner: root
    group: root
    mode: '0644'

- name: Build eBPF programs using Makefile
  make:
    chdir: "{{ ebpf_source_path }}/bpf"
    target: "{{ ebpf_make_target }}"
  register: make_result

- name: Copy compiled eBPF programs to deploy path
  copy:
    src: "{{ ebpf_source_path }}/bpf/{{ item }}"
    dest: "{{ ebpf_bin_path }}/{{ item }}"
    owner: root
    group: root
    mode: '0755'
  loop:
    - tc_core.bpf.o
    - maps.bpf.o

- name: Deploy helper scripts
  copy:
    src: "{{ item }}"
    dest: "{{ ebpf_bin_path }}/{{ item | basename }}"
    mode: '0755'
  loop:
    - "{{ ebpf_source_path }}/scripts/load_tc.sh"
    - "{{ ebpf_source_path }}/scripts/unload_tc.sh"
    - "{{ ebpf_source_path }}/scripts/start_monitoring.sh"

- name: Deploy configuration template
  template:
    src: magma_bpf.conf.j2
    dest: "{{ ebpf_conf_path }}/magma_bpf.conf"
    owner: root
    group: root
    mode: '0644'
