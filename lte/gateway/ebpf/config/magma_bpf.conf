# magma_bpf.conf
# Configuration file for Magma eBPF programs

# Enable or disable eBPF programs
ebpf:
  enable_tc: true            # Attach eBPF to TC hooks (clsact)
  enable_xdp: false          # Use XDP instead of TC (optional)
  debug: false               # Enable verbose debug logs

# OVS ports to attach eBPF programs
ports:
  br_magma: "br-magma"       # Magma bridge
  gtp0: "gtp0"               # GTP user plane interface
  sgi0: "sgi0"               # SGi uplink interface

# Map sizes (tune based on number of subscribers/sessions)
maps:
  gtp_sessions_max: 10000
  ul_dl_stats_max: 10000
  metadata_max: 5000
  perf_event_buffer_size: 8192

# TC settings
tc:
  qdisc: "clsact"           
  ingress: true              
  egress: true                

# Perf buffer / event settings
perf:
  enable: true
  page_count: 64              
  poll_timeout_ms: 100      

# Logging / debug
logging:
  enable: false          
  level: "info"           

# Optional XDP configuration
xdp:
  iface: ""          
  mode: "skb"               

# Miscellaneous
misc:
  pin_path: "/sys/fs/bpf/magma"   
  reload_on_failure: true      
